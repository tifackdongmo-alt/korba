services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: korba_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: korba
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-korba}
      POSTGRES_DB: korba
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korba -d korba"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: korba_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: korba_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://korba:${POSTGRES_PASSWORD:-korba}@postgres:5432/korba
      DATABASE_URL_SYNC: postgresql+psycopg2://korba:${POSTGRES_PASSWORD:-korba}@postgres:5432/korba
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-false}
      AFRICAS_TALKING_API_KEY: ${AFRICAS_TALKING_API_KEY:-}
      AFRICAS_TALKING_USERNAME: ${AFRICAS_TALKING_USERNAME:-sandbox}
      ORANGE_MONEY_MERCHANT_KEY: ${ORANGE_MONEY_MERCHANT_KEY:-}
      WAVE_API_KEY: ${WAVE_API_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      ALLOWED_ORIGINS: '["https://korba.app","http://localhost:3000"]'
    expose:
      - "8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: korba_frontend
    restart: unless-stopped
    expose:
      - "80"
    environment:
      VITE_API_URL: /api
      VITE_WS_URL: /

  nginx:
    image: nginx:1.27-alpine
    container_name: korba_nginx
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro

volumes:
  postgres_data:
  redis_data:
  certbot_data:
